---
- name: Debug AWX Pod Network to vCenter
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: 3. Test Raw TCP Port 443 Connection
      ansible.builtin.wait_for:
        host: "{{ vcenter_hostname }}" # Replace with your exact vCenter IP or FQDN
        port: 443
        timeout: 5
      register: port_test
      ignore_errors: true

    - name: Print Debug Results
      ansible.builtin.debug:
        msg: 
          - "Port Result: {{ port_test }}"
